<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>تسجيل الدخول</h2>
        <form onsubmit="handleLogin(event)">
            <input type="text" id="studentId" placeholder="الرقم الجامعي" required>
            <input type="password" id="password" placeholder="كلمة السر" required>
            <button type="submit" class="btn-primary">دخول</button>
        </form>
    </div>

    <script>
    function handleLogin(event) {
        event.preventDefault(); 
        const studentId = document.getElementById('studentId').value;
        const password = document.getElementById('password').value;
        
        if (studentId === "2026" && password === "123456") {
            window.location.href = "index.html"; 
        } else {
            alert("الرقم الجامعي او كلمة السر غير صحيحة");
        }
    }
    </script>
</body>
</html>
